<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telar · Mayo · Junio · Julio · 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  /* ==========================================================
     TELAR · Calendario interno de coordinación
     Convenio 1022 de 2025 · Artes para la Paz
     ========================================================== */

  :root {
    /* Paleta híbrida sobria de coordinación */
    --crema: #F5EFE6;
    --crema-claro: #FAF6EE;
    --tinta: #1F1733;
    --tinta-suave: #5C5170;
    --linea: #E2DAD0;
    --linea-suave: #EFE8DD;
    --blanco: #FFFFFF;

    /* Colores de carriles (cada uno toma de su red de origen) */
    --c1: #D97B3F;          /* Naranja Polen · Red de Mujeres → Formación Puente */
    --c2: #5B2A86;          /* Violeta Territorio · Red de Mujeres → Autonomía Digital */
    --c3: #3F4FB8;          /* Azul cercano al violeta · Red de Mujeres → Identidad */
    --hito: #5BA866;        /* Verde Manglar · Red de Mujeres → Hito */
    --rij: #FF6B35;         /* Naranja Territorio · RIJ → guiño cromático */

    /* Tipos */
    --titular: 'Work Sans', system-ui, sans-serif;
    --cuerpo: 'DM Sans', system-ui, sans-serif;
    --acento: 'Caveat', cursive;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--crema);
    color: var(--tinta);
    font-family: var(--cuerpo);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ==========================================================
     CABECERA
     ========================================================== */
  header {
    background: var(--tinta);
    color: var(--crema);
    padding: 2.4rem 2rem 2rem;
    border-bottom: 4px solid var(--c2);
    position: relative;
    overflow: hidden;
  }

  /* Cinta de colores en la parte superior */
  .cinta {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    display: flex;
  }
  .cinta span { flex: 1; }
  .cinta span:nth-child(1) { background: var(--c2); }
  .cinta span:nth-child(2) { background: var(--c3); }
  .cinta span:nth-child(3) { background: var(--hito); }
  .cinta span:nth-child(4) { background: #F4C430; }
  .cinta span:nth-child(5) { background: var(--c1); }

  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
  }

  .eyebrow {
    font-family: var(--cuerpo);
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(245, 239, 230, 0.7);
    margin-bottom: 0.6rem;
  }

  h1 {
    font-family: var(--titular);
    font-size: clamp(2.4rem, 5vw, 3.6rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 0.3rem;
  }

  h1 span.acento {
    font-family: var(--acento);
    font-weight: 500;
    color: #F4C430;
    font-style: normal;
    letter-spacing: 0;
  }

  .subtitulo {
    font-size: 1.05rem;
    color: rgba(245, 239, 230, 0.85);
    margin-bottom: 1.4rem;
    font-style: italic;
  }

  .meta-info {
    display: flex;
    flex-wrap: wrap;
    gap: 1.2rem 2rem;
    font-size: 0.85rem;
    color: rgba(245, 239, 230, 0.7);
    padding-top: 1.2rem;
    border-top: 1px solid rgba(245, 239, 230, 0.2);
  }

  .meta-info strong { color: var(--crema); font-weight: 600; }

  /* ==========================================================
     LEYENDA DE CARRILES
     ========================================================== */
  .leyenda {
    background: var(--crema-claro);
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--linea);
  }

  .leyenda-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1rem;
  }

  .carril-card {
    display: flex;
    align-items: flex-start;
    gap: 0.7rem;
    padding: 0.4rem 0;
  }

  .carril-pildora {
    width: 38px;
    min-width: 38px;
    height: 22px;
    border-radius: 3px;
    color: white;
    font-family: var(--titular);
    font-weight: 700;
    font-size: 0.72rem;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0.04em;
    margin-top: 2px;
  }

  .carril-info { flex: 1; }
  .carril-info .nombre {
    font-family: var(--titular);
    font-weight: 700;
    font-size: 0.92rem;
    color: var(--tinta);
    line-height: 1.2;
  }
  .carril-info .descripcion {
    font-size: 0.78rem;
    color: var(--tinta-suave);
    line-height: 1.35;
    margin-top: 2px;
  }

  /* ==========================================================
     CALENDARIO PRINCIPAL
     ========================================================== */
  main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 2.5rem 2rem 4rem;
  }

  .mes {
    margin-bottom: 3.5rem;
  }

  .mes-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 1.2rem;
    padding-bottom: 0.8rem;
    border-bottom: 2px solid var(--linea);
  }

  .mes-nombre {
    font-family: var(--titular);
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--tinta);
  }

  .mes-anio {
    font-family: var(--cuerpo);
    font-size: 1.1rem;
    color: var(--tinta-suave);
    font-weight: 400;
  }

  .mes-conteo {
    margin-left: auto;
    font-size: 0.8rem;
    color: var(--tinta-suave);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* Grid de 7 columnas (días de la semana) */
  .dias-semana {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 6px;
  }

  .dia-semana {
    font-family: var(--titular);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--tinta-suave);
    text-align: center;
    padding: 0.3rem 0;
  }

  .grid-mes {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }

  .dia {
    background: var(--blanco);
    border: 1px solid var(--linea);
    border-radius: 6px;
    min-height: 110px;
    padding: 0.5rem 0.55rem;
    display: flex;
    flex-direction: column;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }

  .dia.fuera {
    background: transparent;
    border: 1px dashed var(--linea-suave);
    opacity: 0.4;
  }

  .dia.findesemana {
    background: var(--linea-suave);
  }

  .dia:has(.evento):hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(31, 23, 51, 0.08);
  }

  .num-dia {
    font-family: var(--titular);
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--tinta);
    line-height: 1;
    margin-bottom: 0.4rem;
  }

  .dia.fuera .num-dia { color: var(--tinta-suave); }

  /* Eventos dentro de cada día */
  .evento {
    background: var(--linea-suave);
    border-left: 3px solid var(--c2);
    padding: 4px 6px;
    border-radius: 3px;
    font-size: 0.72rem;
    line-height: 1.25;
    margin-bottom: 4px;
    cursor: help;
  }

  .evento .ev-carril {
    font-family: var(--titular);
    font-weight: 700;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    color: var(--tinta-suave);
    text-transform: uppercase;
    display: block;
    line-height: 1.1;
  }

  .evento .ev-titulo {
    font-weight: 500;
    color: var(--tinta);
    line-height: 1.2;
    margin-top: 1px;
  }

  /* Color por carril */
  .evento.C1 { border-left-color: var(--c1); }
  .evento.C1 .ev-carril { color: var(--c1); }
  .evento.C2 { border-left-color: var(--c2); }
  .evento.C2 .ev-carril { color: var(--c2); }
  .evento.C3 { border-left-color: var(--c3); }
  .evento.C3 .ev-carril { color: var(--c3); }
  .evento.HITO {
    border-left-color: var(--hito);
    background: rgba(91, 168, 102, 0.1);
  }
  .evento.HITO .ev-carril { color: var(--hito); }

  /* Eventos destacados */
  .evento.destacado {
    background: var(--tinta);
    border-left-width: 4px;
  }
  .evento.destacado .ev-titulo,
  .evento.destacado .ev-carril {
    color: var(--crema);
  }
  .evento.destacado.C2 .ev-carril { color: #F4C430; }
  .evento.destacado.HITO .ev-carril { color: #F4C430; }

  /* Estrella de destacado */
  .evento.destacado::before {
    content: "★ ";
    color: #F4C430;
    font-size: 0.7rem;
  }

  /* ==========================================================
     PIE
     ========================================================== */
  footer {
    background: var(--tinta);
    color: rgba(245, 239, 230, 0.75);
    padding: 2rem;
    text-align: center;
    font-size: 0.85rem;
    border-top: 4px solid var(--c2);
  }

  footer strong { color: var(--crema); font-weight: 600; }

  footer a {
    color: #F4C430;
    text-decoration: none;
    border-bottom: 1px dotted #F4C430;
  }
  footer a:hover { border-bottom-style: solid; }

  .footer-cita {
    font-family: var(--titular);
    font-style: italic;
    font-size: 1rem;
    color: var(--crema);
    margin-bottom: 0.6rem;
  }

  /* ==========================================================
     RESPONSIVE
     ========================================================== */
  @media (max-width: 900px) {
    .dia { min-height: 92px; padding: 0.4rem; }
    .num-dia { font-size: 0.85rem; }
    .evento { font-size: 0.68rem; padding: 3px 5px; }
    .evento .ev-carril { font-size: 0.58rem; }
  }

  @media (max-width: 640px) {
    header { padding: 1.6rem 1.1rem 1.4rem; }
    main { padding: 1.6rem 1rem 3rem; }
    .leyenda { padding: 1.2rem 1.1rem; }
    h1 { font-size: 2rem; }
    .mes-nombre { font-size: 1.5rem; }

    /* En móvil cambiamos a lista en vez de grilla */
    .dias-semana { display: none; }
    .grid-mes {
      grid-template-columns: 1fr;
      gap: 4px;
    }
    .dia {
      flex-direction: row;
      align-items: flex-start;
      gap: 0.7rem;
      min-height: 0;
    }
    .dia.fuera, .dia.sineventos { display: none; }
    .num-dia {
      min-width: 38px;
      padding-top: 4px;
      font-size: 1rem;
    }
    .dia .eventos-dia { flex: 1; }
  }

  /* ==========================================================
     PRINT
     ========================================================== */
  @media print {
    body { background: white; font-size: 11px; }
    header, footer, .leyenda { background: white !important; color: var(--tinta) !important; }
    header h1, .footer-cita { color: var(--tinta) !important; }
    .dia { break-inside: avoid; min-height: 80px; }
    .mes { break-inside: avoid; }
    .evento.destacado { background: white !important; border: 2px solid var(--tinta); }
    .evento.destacado .ev-titulo, .evento.destacado .ev-carril { color: var(--tinta) !important; }
  }

  /* ============ ICONO DE EDICIÓN ============ */
  .evento { position: relative; }
  .btn-edit-event {
    position: absolute; top: 4px; right: 4px; background: white; border: 1px solid var(--tinta);
    border-radius: 4px; font-size: 0.8rem; cursor: pointer; display: none; padding: 2px 4px;
    z-index: 10;
  }
  .evento:hover .btn-edit-event { display: block; }
  .btn-edit-event:hover { background: var(--naranja); color: white; border-color: var(--naranja); }

  /* ============ AGREGAR EVENTO EN DIA ============ */
  .dia { position: relative; }
  .btn-add-event-day {
    position: absolute; top: 4px; right: 4px; background: transparent; border: none;
    font-size: 1.5rem; cursor: pointer; color: #a49e8d; opacity: 0; transition: opacity 0.2s;
    line-height: 0.8; z-index: 5; padding: 0 4px;
  }
  .dia:hover .btn-add-event-day { opacity: 1; }
  .btn-add-event-day:hover { color: var(--tinta); transform: scale(1.1); }

  /* ============ SINGLE EVENT MODAL ============ */
  .modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(31, 23, 51, 0.8); display: none;
    justify-content: center; align-items: center; z-index: 1000;
    padding: 1rem;
  }
  .modal-overlay.active { display: flex; }
  .modal-content {
    background: var(--crema); border-radius: 8px; width: 100%; max-width: 500px;
    padding: 2rem; color: var(--tinta); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    position: relative;
  }
  .modal-header { margin-bottom: 1.5rem; border-bottom: 2px solid var(--tinta); padding-bottom: 0.5rem; }
  .modal-header h2 { font-family: 'DM Sans', sans-serif; font-size: 1.5rem; margin: 0; }
  .btn-cerrar { position: absolute; top: 1.5rem; right: 1.5rem; background: none; border: none; font-size: 2rem; cursor: pointer; color: var(--tinta); line-height: 1; }
  .btn-cerrar:hover { color: var(--naranja); }
  
  .btn-primary { background: var(--tinta); color: white; border: none; padding: 0.8rem 1.5rem; font-family: 'DM Sans', sans-serif; font-weight: 700; border-radius: 4px; cursor: pointer; font-size: 1rem; }
  .btn-primary:hover { background: var(--naranja); }
  .btn-secondary { background: transparent; color: var(--tinta); border: 2px solid var(--tinta); padding: 0.5rem 1rem; font-family: 'DM Sans', sans-serif; font-weight: 700; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
  .btn-secondary:hover { background: var(--tinta); color: white; }
  .btn-danger { background: #e74c3c; color: white; border: none; padding: 0.5rem 0.8rem; border-radius: 4px; cursor: pointer; font-weight: bold; }
  
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-weight: bold; margin-bottom: 0.3rem; font-size: 0.9rem; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 0.6rem; border: 1px solid #ccc; border-radius: 4px; 
    font-family: 'Work Sans', sans-serif; box-sizing: border-box;
  }
  .form-group textarea { resize: vertical; min-height: 80px; }
  
  .modal-actions { display: flex; justify-content: space-between; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #ddd; }
</style>
</head>
<body>

<!-- ============ CABECERA ============ -->
<header>
  <div class="cinta"><span></span><span></span><span></span><span></span><span></span></div>
  <div class="header-inner">
    <div class="eyebrow">Convenio 1022 de 2025 · Artes para la Paz</div>
    <h1>Telar <span class="acento" id="rangoMeses">mayo · junio · julio</span></h1>
    <div class="subtitulo" id="descripcion">Calendario interno de coordinación.</div>

    <div class="meta-info">
      <div><strong>Editan:</strong> <span id="editores"></span></div>
      <div><strong>Última actualización:</strong> <span id="ultimaAct"></span></div>
      <div><strong>Versión:</strong> <span id="version"></span></div>
    </div>
  </div>
</header>

<!-- ============ LEYENDA ============ -->
<section class="leyenda">
  <div class="leyenda-inner" id="leyenda"></div>
</section>

<!-- ============ CALENDARIO ============ -->
<main id="calendario"></main>

<!-- ============ PIE ============ -->
<footer>
  <div class="footer-cita">Donde las historias se tejen y transforman — y seguimos tejiendo.</div>
  <div style="margin-top: 1rem;">
    Este Telar es un documento vivo. 
    <button id="btnNuevoEventoGlobal" class="btn-primary" style="font-size: 0.9rem; padding: 0.4rem 0.8rem; margin: 0 0.5rem;">+ Agregar Sesión</button>
    <button id="btnGuardarArchivoGlobal" class="btn-secondary" style="font-size: 0.9rem; padding: 0.4rem 0.8rem;">💾 Guardar Archivo</button>
  </div>
</footer>

<!-- ============ MODAL EVENTO ============ -->
<div class="modal-overlay" id="modalEditor">
  <div class="modal-content">
    <button class="btn-cerrar" id="btnCerrarEditor">&times;</button>
    <div class="modal-header">
      <h2 id="modalTitulo">Editar Sesión</h2>
    </div>
    
    <input type="hidden" id="editIndex">
    
    <div class="form-group">
      <label>Fecha</label>
      <input type="date" id="editFecha">
    </div>
    <div class="form-group">
      <label>Carril / Área</label>
      <select id="editCarril"></select>
    </div>
    <div class="form-group">
      <label>Título de la sesión</label>
      <input type="text" id="editTitulo" placeholder="Ej: Formación Puente · S1">
    </div>
    <div class="form-group">
      <label>Hora</label>
      <input type="text" id="editHora" placeholder="Ej: 9:00 AM - 11:00 AM">
    </div>
    <div class="form-group">
      <label>Notas / Ubicación</label>
      <textarea id="editNotas" placeholder="Enlace de Teams, lugar físico, o notas adicionales..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-danger" id="btnEliminarEvento">Eliminar</button>
      <button class="btn-primary" id="btnGuardarEvento">Aplicar Cambios</button>
    </div>
  </div>
</div>

<script>
  // ============================================================
  // TELAR · Lógica del calendario
  // Lee data.json y arma la grilla de tres meses
  // ============================================================

  const MESES = {
    1: 'Enero', 2: 'Febrero', 3: 'Marzo', 4: 'Abril',
    5: 'Mayo', 6: 'Junio', 7: 'Julio', 8: 'Agosto',
    9: 'Septiembre', 10: 'Octubre', 11: 'Noviembre', 12: 'Diciembre'
  };

  // Días de la semana en español, con lunes primero (más natural en Colombia)
  const DIAS_SEMANA = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];

  // Meses que se muestran (puedes cambiar este rango si quieres más adelante)
  const RANGO = [
    { anio: 2026, mes: 5 },
    { anio: 2026, mes: 6 },
    { anio: 2026, mes: 7 }
  ];

  // ------------------------------------------------------------
  // Helpers de fecha
  // ------------------------------------------------------------
  function diasEnMes(anio, mes) {
    return new Date(anio, mes, 0).getDate();
  }

  // Devuelve 0=Lun, 1=Mar, ..., 6=Dom
  function diaSemanaLunes(anio, mes, dia) {
    const d = new Date(anio, mes - 1, dia).getDay(); // 0=Dom..6=Sáb
    return (d + 6) % 7; // convierte a 0=Lun..6=Dom
  }

  function fechaISO(anio, mes, dia) {
    return `${anio}-${String(mes).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
  }

  // ------------------------------------------------------------
  // Render
  // ------------------------------------------------------------
  function renderCabecera(meta) {
    document.getElementById('descripcion').textContent = meta.descripcion;
    document.getElementById('editores').textContent = meta.editores.join(' · ');
    document.getElementById('ultimaAct').textContent = meta.ultimaActualizacion;
    document.getElementById('version').textContent = meta.version;
  }

  function renderLeyenda(carriles) {
    const cont = document.getElementById('leyenda');
    cont.innerHTML = '';
    Object.entries(carriles).forEach(([key, c]) => {
      const card = document.createElement('div');
      card.className = 'carril-card';
      card.innerHTML = `
        <div class="carril-pildora" style="background: ${c.color};">${key}</div>
        <div class="carril-info">
          <div class="nombre">${c.nombre}</div>
          <div class="descripcion">${c.descripcion}</div>
        </div>
      `;
      cont.appendChild(card);
    });
  }

  function renderMes(anio, mes, eventos, carriles) {
    const totalDias = diasEnMes(anio, mes);
    const offsetInicio = diaSemanaLunes(anio, mes, 1);

    // Eventos del mes agrupados por día
    const eventosPorDia = {};
    eventos.forEach(ev => {
      const [a, m, d] = ev.fecha.split('-').map(Number);
      if (a === anio && m === mes) {
        if (!eventosPorDia[d]) eventosPorDia[d] = [];
        eventosPorDia[d].push(ev);
      }
    });

    const totalEventosMes = Object.values(eventosPorDia).reduce((acc, arr) => acc + arr.length, 0);

    // Construir HTML
    const wrapper = document.createElement('section');
    wrapper.className = 'mes';

    wrapper.innerHTML = `
      <div class="mes-header">
        <div class="mes-nombre">${MESES[mes]}</div>
        <div class="mes-anio">${anio}</div>
        <div class="mes-conteo">${totalEventosMes} ${totalEventosMes === 1 ? 'sesión' : 'sesiones'}</div>
      </div>
      <div class="dias-semana">
        ${DIAS_SEMANA.map(d => `<div class="dia-semana">${d}</div>`).join('')}
      </div>
      <div class="grid-mes" id="grid-${anio}-${mes}"></div>
    `;
    document.getElementById('calendario').appendChild(wrapper);

    const grid = document.getElementById(`grid-${anio}-${mes}`);

    // Días vacíos antes del 1 (para alinear con día de semana)
    for (let i = 0; i < offsetInicio; i++) {
      const vacio = document.createElement('div');
      vacio.className = 'dia fuera';
      vacio.innerHTML = `<div class="num-dia">·</div>`;
      grid.appendChild(vacio);
    }

    // Días del mes
    for (let d = 1; d <= totalDias; d++) {
      const div = document.createElement('div');
      div.className = 'dia';

      const ds = diaSemanaLunes(anio, mes, d);
      if (ds === 5 || ds === 6) div.classList.add('findesemana');

      const evs = eventosPorDia[d] || [];
      if (evs.length === 0) div.classList.add('sineventos');

      const fechaDia = fechaISO(anio, mes, d);
      let html = `<div class="num-dia">${d}</div>
                  <button class="btn-add-event-day" onclick="abrirEditor(-1, '${fechaDia}')" title="Añadir sesión a este día">+</button>
                  <div class="eventos-dia">`;
      evs.forEach(ev => {
        const carril = carriles[ev.carril] || { color: '#999', nombre: ev.carril };
        const tooltip = [
          ev.titulo,
          ev.hora ? `Hora: ${ev.hora}` : '',
          ev.duracion ? `Duración: ${ev.duracion}` : '',
          ev.lugar ? `Lugar: ${ev.lugar}` : '',
          ev.notas ? `\n${ev.notas}` : ''
        ].filter(Boolean).join('\n');

        const carrilCorto = ev.carril === 'HITO' ? 'HITO' : `${ev.carril} · ${carril.nombre}`;

        html += `
          <div class="evento ${ev.carril}${ev.destacado ? ' destacado' : ''}" title="${tooltip.replace(/"/g, '&quot;')}">
            <button class="btn-edit-event" onclick="abrirEditor(${ev._index})" title="Editar esta sesión">✏️</button>
            <span class="ev-carril">${carrilCorto}</span>
            <span class="ev-titulo">${ev.titulo}</span>
          </div>
        `;
      });
      html += `</div>`;
      div.innerHTML = html;
      grid.appendChild(div);
    }
  }

  // ------------------------------------------------------------
  // Carga y Editor UI
  // ------------------------------------------------------------
  let currentData = null;
  let fileHandle = null;

  function initCalendar() {
    document.getElementById('calendario').innerHTML = ''; // Limpiar calendario
    renderCabecera(currentData.meta);
    renderLeyenda(currentData.carriles);
    
    const eventosMapeados = currentData.eventos.map((ev, idx) => ({ ...ev, _index: idx }));
    RANGO.forEach(r => renderMes(r.anio, r.mes, eventosMapeados, currentData.carriles));
  }

  fetch('data.json')
    .then(r => {
      if (!r.ok) throw new Error('No se pudo cargar data.json');
      return r.json();
    })
    .then(data => {
      currentData = data;
      initCalendar();
    })
    .catch(err => {
      document.getElementById('calendario').innerHTML = `
        <div style="background: #FFF3E0; border-left: 4px solid #D97B3F; padding: 1.5rem; border-radius: 4px; color: #1F1733;">
          <strong>No se pudo cargar el calendario.</strong><br>
          ${err.message}<br><br>
          <small>Si estás abriendo el archivo directamente con doble clic, el navegador bloquea la lectura de data.json por seguridad. Sube el repo a GitHub Pages o usa un servidor local (<code>python3 -m http.server</code>).</small>
        </div>
      `;
      console.error(err);
    });

  // --- Lógica del Editor de un solo evento ---
  const modal = document.getElementById('modalEditor');
  const btnCerrar = document.getElementById('btnCerrarEditor');
  const btnGuardar = document.getElementById('btnGuardarEvento');
  const btnEliminar = document.getElementById('btnEliminarEvento');
  const selectCarril = document.getElementById('editCarril');

  btnCerrar.addEventListener('click', () => modal.classList.remove('active'));

  window.abrirEditor = function(index, fechaSugerida = null) {
    if (index === -1) {
      document.getElementById('modalTitulo').textContent = "Nueva Sesión";
      document.getElementById('editIndex').value = -1;
      document.getElementById('editFecha').value = fechaSugerida || new Date().toISOString().split('T')[0];
      document.getElementById('editTitulo').value = "";
      document.getElementById('editHora').value = "";
      document.getElementById('editNotas').value = "";
      btnEliminar.style.display = 'none';
      poblarCarriles("C1");
    } else {
      document.getElementById('modalTitulo').textContent = "Editar Sesión";
      const ev = currentData.eventos[index];
      document.getElementById('editIndex').value = index;
      document.getElementById('editFecha').value = ev.fecha;
      document.getElementById('editTitulo').value = ev.titulo;
      document.getElementById('editHora').value = ev.hora || "";
      document.getElementById('editNotas').value = ev.notas || "";
      btnEliminar.style.display = 'block';
      poblarCarriles(ev.carril);
    }
    modal.classList.add('active');
  };

  function poblarCarriles(seleccionado) {
    selectCarril.innerHTML = '';
    Object.entries(currentData.carriles).forEach(([k, c]) => {
      const opt = document.createElement('option');
      opt.value = k;
      opt.textContent = `${k} - ${c.nombre}`;
      if (k === seleccionado) opt.selected = true;
      selectCarril.appendChild(opt);
    });
  }

  btnEliminar.addEventListener('click', () => {
    const index = parseInt(document.getElementById('editIndex').value);
    if (confirm("¿Estás seguro de que quieres eliminar esta sesión de forma permanente?")) {
      currentData.eventos.splice(index, 1);
      modal.classList.remove('active');
      initCalendar();
      guardarArchivoAutomatico();
    }
  });

  btnGuardar.addEventListener('click', () => {
    const index = parseInt(document.getElementById('editIndex').value);
    const carrilVal = selectCarril.value;
    
    const evActualizado = {
      fecha: document.getElementById('editFecha').value,
      carril: carrilVal,
      titulo: document.getElementById('editTitulo').value,
      hora: document.getElementById('editHora').value,
      duracion: index === -1 ? "" : (currentData.eventos[index].duracion || ""),
      lugar: index === -1 ? "" : (currentData.eventos[index].lugar || ""),
      notas: document.getElementById('editNotas').value,
      destacado: carrilVal === 'HITO'
    };

    if (index === -1) {
      currentData.eventos.push(evActualizado);
    } else {
      currentData.eventos[index] = evActualizado;
    }

    modal.classList.remove('active');
    initCalendar();
    guardarArchivoAutomatico();
  });

  document.getElementById('btnNuevoEventoGlobal').addEventListener('click', () => {
    abrirEditor(-1);
  });

  document.getElementById('btnGuardarArchivoGlobal').addEventListener('click', () => {
    guardarArchivoAutomatico(true);
  });

  async function guardarArchivoAutomatico(forcePrompt = false) {
    currentData.meta.ultimaActualizacion = new Date().toISOString().split('T')[0];
    const jsonString = JSON.stringify(currentData, null, 2);

    try {
      if (window.showOpenFilePicker) {
        if (!fileHandle) {
          if (!forcePrompt) {
            // Si es un guardado automático tras editar un evento, le avisamos sutilmente
            const resp = confirm('Para que los cambios se guarden en tu disco duro, debes seleccionar el archivo data.json. ¿Deseas hacerlo ahora?');
            if (!resp) return;
          }
          [fileHandle] = await window.showOpenFilePicker({
            types: [{ description: 'JSON Files', accept: { 'application/json': ['.json'] } }],
            multiple: false
          });
        }
        const writable = await fileHandle.createWritable();
        await writable.write(jsonString);
        await writable.close();
        
        // Notificación visual de guardado
        const btnGuardarGlobal = document.getElementById('btnGuardarArchivoGlobal');
        const textOriginal = btnGuardarGlobal.innerHTML;
        btnGuardarGlobal.innerHTML = '✅ Guardado';
        btnGuardarGlobal.style.backgroundColor = '#5BA866';
        btnGuardarGlobal.style.color = 'white';
        setTimeout(() => {
          btnGuardarGlobal.innerHTML = textOriginal;
          btnGuardarGlobal.style.backgroundColor = '';
          btnGuardarGlobal.style.color = '';
        }, 2000);

      } else {
        throw new Error('API no soportada');
      }
    } catch (err) {
      console.log('Fallback a descarga:', err);
      const blob = new Blob([jsonString], {type: "application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'data.json';
      a.click();
      URL.revokeObjectURL(url);
    }
  }
</script>
